<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Outfit Finder</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

.card{
background:#181818;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:8px;
background:#242424;
color:white;
font-size:16px;
}

button{
background:#ff4d4d;
border:none;
padding:14px 25px;
border-radius:8px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff1f1f;
}

.result{
margin-top:40px;
background:#181818;
padding:20px;
border-radius:12px;
}

</style>

</head>


<body>

<div class="container">

<h1>AI Outfit Finder</h1>

<p class="subtitle">
Find the perfect outfit using AI
</p>

<div class="card">

<label>Height (cm)</label>
<input type="number">

<label>Weight (kg)</label>
<input type="number">

<label>Style</label>
<select>
<option>Streetwear</option>
<option>Minimal</option>
<option>Formal</option>
<option>Gym</option>
</select>

<label>Budget</label>
<select>
<option>Budget</option>
<option>Midrange</option>
<option>Premium</option>
</select>

<button>Find My Outfit</button>

</div>

<div class="result">

<h2>Recommended Outfit</h2>

<p>
Your AI outfit suggestions will appear here.
</p>

</div>

</div>

</body>
</html>
