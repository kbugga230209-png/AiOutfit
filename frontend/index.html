<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Outfit Finder</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI, sans-serif;
}

body{
background: radial-gradient(circle at top,#1a1a2e,#0f0f0f);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

/* floating glow background */

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:linear-gradient(45deg,#ff4d4d,#ff0080);
filter:blur(180px);
opacity:0.25;
top:-150px;
left:-150px;
z-index:-1;
animation:float 8s infinite alternate ease-in-out;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

.container{
width:100%;
max-width:900px;
padding:40px;
text-align:center;
}

/* title */

h1{
font-size:48px;
background:linear-gradient(90deg,#ff4d4d,#ff7b7b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

/* glass card */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
padding:35px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* inputs */

input,select{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:22px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.07);
color:white;
font-size:15px;
outline:none;
}

input:focus,select:focus{
background:rgba(255,255,255,0.12);
}

/* button */

button{
background:linear-gradient(135deg,#ff4d4d,#ff0066);
border:none;
padding:14px 30px;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(255,0,80,0.3);
}

button:hover{
transform:scale(1.05);
box-shadow:0 15px 30px rgba(255,0,80,0.5);
}

/* result card */

.result{
margin-top:40px;
padding:25px;
border-radius:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
opacity:0;
transform:translateY(20px);
transition:0.5s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.result h2{
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Outfit Finder</h1>

<p class="subtitle">
Find the perfect outfit using AI
</p>

<div class="card">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Style</label>
<select id="style">
<option>Streetwear</option>
<option>Minimal</option>
<option>Formal</option>
<option>Gym</option>
</select>

<label>Budget</label>
<select id="budget">
<option>Budget</option>
<option>Midrange</option>
<option>Premium</option>
</select>

<button onclick="generateOutfit()">Find My Outfit</button>

</div>

<div class="result" id="result">

<h2>Recommended Outfit</h2>

<p id="outfitText">
Your AI outfit suggestions will appear here.
</p>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
